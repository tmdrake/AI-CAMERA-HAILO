{% extends "base.html" %}

{% block title %}Events - AI Camera{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2 class="mb-4">Events</h2>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div id="eventsList">
                    <p class="text-muted">Loading events...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal for viewing full image -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Event Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center">
                <img id="modalImage" src="" class="img-fluid" alt="Event image">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function loadEvents() {
    fetch('/api/events')
        .then(response => response.json())
        .then(events => {
            const container = document.getElementById('eventsList');
            if (events.length === 0) {
                container.innerHTML = '<p class="text-muted">No events recorded</p>';
                return;
            }
            
            let html = '<div class="row">';
            events.forEach((event, index) => {
                const time = new Date(event.timestamp).toLocaleString();
                const detectionCount = event.detections.length;
                const confidences = event.detections.map(d => (d.confidence * 100).toFixed(1) + '%').join(', ');
                
                const imgHtml = event.image_filename 
                    ? `<img src="/images/${event.image_filename}" class="img-thumbnail" style="max-height: 100px; cursor: pointer;" onclick="showImage('${event.image_filename}')" alt="Event">`
                    : '<span class="text-muted">No image</span>';
                
                html += `<div class="col-md-4 col-lg-3 mb-3">
                    <div class="card">
                        <div class="card-body p-2">
                            <div class="text-center mb-2">${imgHtml}</div>
                            <small><strong>${time}</strong></small><br>
                            <small class="text-muted">${detectionCount} person(s)</small><br>
                            <small class="text-muted">${confidences}</small>
                        </div>
                    </div>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        });
}

function showImage(filename) {
    document.getElementById('modalImage').src = '/images/' + filename;
    const modal = new bootstrap.Modal(document.getElementById('imageModal'));
    modal.show();
}

loadEvents();
setInterval(loadEvents, 10000);
</script>
{% endblock %}
